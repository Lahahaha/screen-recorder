name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release
      
      - name: Create app bundle
        run: |
          mkdir -p ScreenRecorder.app/Contents/MacOS
          mkdir -p ScreenRecorder.app/Contents/Resources
          cp target/release/screen-recorder ScreenRecorder.app/Contents/MacOS/
          cp Info.plist ScreenRecorder.app/Contents/
      
      - name: Download ffmpeg
        run: |
          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-arm64" -o ScreenRecorder.app/Contents/Resources/ffmpeg
          chmod +x ScreenRecorder.app/Contents/Resources/ffmpeg
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-macos
          path: ScreenRecorder.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release
      
      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract
          mkdir ScreenRecorder
          cp target/release/screen-recorder.exe ScreenRecorder/
          cp ffmpeg-extract/*/bin/ffmpeg.exe ScreenRecorder/
      
      - name: Create self-extracting archive
        run: |
          # 下载 7-Zip
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2301-x64.exe" -OutFile 7z-installer.exe
          Start-Process -FilePath .\7z-installer.exe -ArgumentList "/S" -Wait
          
          # 创建 7z 压缩包
          & "C:\Program Files\7-Zip\7z.exe" a -t7z ScreenRecorder.7z .\ScreenRecorder\*
          
          # 创建自解压配置
          @"
          ;!@Install@!UTF-8!
          Title="Screen Recorder"
          RunProgram="ScreenRecorder\screen-recorder.exe"
          ;!@InstallEnd@!
          "@ | Out-File -Encoding UTF8 config.txt
          
          # 创建自解压包
          $sfxModule = "C:\Program Files\7-Zip\7z.sfx"
          cat $sfxModule, config.txt, ScreenRecorder.7z -Encoding Byte | Set-Content ScreenRecorder.exe -Encoding Byte
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-windows
          path: ScreenRecorder.exe
