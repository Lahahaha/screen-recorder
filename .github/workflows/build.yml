name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  checks:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release
      
      - name: Create app bundle
        run: |
          mkdir -p ScreenRecorder.app/Contents/MacOS
          mkdir -p ScreenRecorder.app/Contents/Resources
          cp target/release/screen-recorder ScreenRecorder.app/Contents/MacOS/
          cp Info.plist ScreenRecorder.app/Contents/
      
      - name: Download ffmpeg
        run: |
          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-arm64" -o ScreenRecorder.app/Contents/Resources/ffmpeg
          chmod +x ScreenRecorder.app/Contents/Resources/ffmpeg
      
      - name: Sign app (ad-hoc)
        run: |
          codesign --force --sign - ScreenRecorder.app/Contents/Resources/ffmpeg
          codesign --force --sign - ScreenRecorder.app/Contents/MacOS/screen-recorder
          codesign --force --deep --sign - ScreenRecorder.app
      
      - name: Package
        run: |
          zip -r ScreenRecorder-macos-arm64.zip ScreenRecorder.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-macos
          path: ScreenRecorder-macos-arm64.zip

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release
      
      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract
          mkdir ScreenRecorder
          cp target/release/screen-recorder.exe ScreenRecorder/
          cp ffmpeg-extract/*/bin/ffmpeg.exe ScreenRecorder/
      
      - name: Package
        run: |
          Compress-Archive -Path ScreenRecorder\* -DestinationPath ScreenRecorder-windows-x64.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-windows
          path: ScreenRecorder-windows-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ScreenRecorder-macos/ScreenRecorder-macos-arm64.zip
            artifacts/ScreenRecorder-windows/ScreenRecorder-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
